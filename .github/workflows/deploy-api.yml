name: Deploy API to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'src/CollegeAttendance.API/**'
      - 'src/CollegeAttendance.Application/**'
      - 'src/CollegeAttendance.Domain/**'
      - 'src/CollegeAttendance.Infrastructure/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_WEBAPP_NAME: college-attendance-api-arasanirohith
  AZURE_WEBAPP_PACKAGE_PATH: './publish'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/CollegeAttendance.API/CollegeAttendance.API.csproj

      - name: Build
        run: dotnet build src/CollegeAttendance.API/CollegeAttendance.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/CollegeAttendance.API/CollegeAttendance.API.csproj --configuration Release --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }} --no-build

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
